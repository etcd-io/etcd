version: "2"
linters:
  default: all
  disable:
    - exhaustruct
    - varnamelen
    - depguard
  settings:
    cyclop:
      max-complexity: 21
    lll:
      line-length: 130
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
