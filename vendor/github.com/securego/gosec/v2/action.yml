name: "Gosec Security Checker"
description: "Runs the gosec security checker"
author: "@ccojocar"

inputs:
  args:
    description: "Arguments for gosec"
    required: true
    default: "-h"

runs:
  using: "docker"
  image: "docker://ghcr.io/securego/gosec:2.25.0"
  args:
    - ${{ inputs.args }}

branding:
  icon: "shield"
  color: "blue"
