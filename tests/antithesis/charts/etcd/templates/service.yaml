apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.etcdservice.name }}
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: 2379
      targetPort: client
    - name: peer
      port: 2380
      targetPort: peer
  selector: 
    app: etcd
